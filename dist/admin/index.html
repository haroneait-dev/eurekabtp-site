<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Eureka BTP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { background: #f4f5f7; min-height: 100vh; font-family: 'Inter', sans-serif; }
    .admin-header { background: var(--anthracite); color: #fff; padding: 1.1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    .admin-header h1 { font-size: 1.05rem; font-weight: 700; }
    .admin-header-right { display: flex; align-items: center; gap: 1.25rem; font-size: 0.85rem; }
    .admin-header-right span { color: rgba(255,255,255,0.7); }
    .admin-header-right button, .admin-header-right a {
      background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.3);
      padding: 0.45rem 0.9rem; border-radius: 8px;
      font-family: inherit; font-size: 0.82rem; cursor: pointer;
      text-decoration: none; transition: all 0.2s;
    }
    .admin-header-right button:hover, .admin-header-right a:hover {
      background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.6);
    }

    .admin-wrap { max-width: 1180px; margin: 0 auto; padding: 2.5rem 2rem; }
    .admin-intro { margin-bottom: 2.5rem; }
    .admin-intro h2 { font-size: 1.6rem; font-weight: 800; color: var(--anthracite); margin-bottom: 0.4rem; letter-spacing: -0.01em; }
    .admin-intro p { color: var(--gray); font-size: 0.95rem; }

    .admin-tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; }
    .admin-tab {
      padding: 0.65rem 1.2rem; background: #fff; border: 1px solid #e3e5ea;
      border-radius: 9px; font-size: 0.88rem; font-weight: 600; color: var(--gray);
      text-decoration: none; transition: all 0.2s;
    }
    .admin-tab:hover { color: var(--anthracite); border-color: var(--anthracite); }
    .admin-tab.is-active { background: var(--anthracite); color: #fff; border-color: var(--anthracite); }

    .pages-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }
    .page-card {
      background: #fff; border-radius: 14px; padding: 1.5rem;
      border: 1px solid #e3e5ea;
      box-shadow: 0 4px 16px rgba(0,0,0,0.04);
      display: flex; flex-direction: column; gap: 1rem;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .page-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      border-color: var(--anthracite);
    }
    .page-card-title { font-size: 1.05rem; font-weight: 700; color: var(--anthracite); }
    .page-card-meta { font-size: 0.78rem; color: var(--gray); }
    .page-card-actions { display: flex; gap: 0.5rem; margin-top: auto; }
    .page-card-btn {
      flex: 1; padding: 0.65rem; background: var(--accent); color: #fff;
      border: none; border-radius: 9px; font-family: inherit;
      font-weight: 600; font-size: 0.85rem; text-decoration: none;
      text-align: center; cursor: pointer; transition: background 0.2s;
    }
    .page-card-btn:hover { background: #d85408; }
    .page-card-btn--ghost {
      background: transparent; color: var(--anthracite);
      border: 1px solid #e3e5ea;
    }
    .page-card-btn--ghost:hover { background: #f4f5f7; border-color: var(--anthracite); }

    .admin-empty { text-align: center; padding: 4rem 2rem; color: var(--gray); }
    .admin-empty h3 { color: var(--anthracite); margin-bottom: 0.5rem; }
    .admin-empty code {
      background: #fff; padding: 0.2rem 0.5rem; border-radius: 4px;
      font-family: monospace; font-size: 0.85rem; border: 1px solid #e3e5ea;
    }
  </style>
  <script type="module" crossorigin src="/assets/adminIndex-n8xL__yy.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/supabase-client-Dogz5OU6.js">
  <link rel="stylesheet" crossorigin href="/assets/style-GDHS0RUd.css">
</head>
<body>

<header class="admin-header">
  <h1>Admin Eureka BTP</h1>
  <div class="admin-header-right">
    <span id="userLabel">—</span>
    <a href="/index.html" target="_blank">Voir le site</a>
    <button id="logoutBtn">Déconnexion</button>
  </div>
</header>

<div class="admin-wrap">
  <div class="admin-intro">
    <h2>Tableau de bord</h2>
    <p>Sélectionnez une page pour modifier son contenu, ou éditez le catalogue des pièces détachées.</p>
  </div>

  <nav class="admin-tabs">
    <a href="index.html" class="admin-tab is-active">Pages du site</a>
    <a href="pieces.html" class="admin-tab">Catalogue pièces</a>
  </nav>

  <div id="pagesContainer" class="pages-grid">
    <div class="admin-empty">
      <h3>Chargement…</h3>
    </div>
  </div>
</div>


</body>
</html>
