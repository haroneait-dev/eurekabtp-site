<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Pièces Détachées — Eureka BTP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body { background: var(--light-gray); min-height: 100vh; }
    .admin-header { background: var(--anthracite); color: #fff; padding: 1.1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    .admin-header h1 { font-size: 1.05rem; font-weight: 700; letter-spacing: -0.01em; }
    .admin-header-right { display: flex; align-items: center; gap: 1.25rem; font-size: 0.85rem; }
    .admin-header-right span { color: rgba(255,255,255,0.7); }
    .admin-header-right button { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 0.45rem 0.9rem; border-radius: 8px; font-family: inherit; font-size: 0.82rem; cursor: pointer; transition: all 0.2s; }
    .admin-header-right button:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.6); }
    .admin-wrap { max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem; display: grid; grid-template-columns: 380px 1fr; gap: 2rem; align-items: start; }
    @media (max-width: 880px) { .admin-wrap { grid-template-columns: 1fr; } }
    .admin-card { background: #fff; border-radius: 14px; padding: 1.75rem; box-shadow: 0 8px 30px rgba(0,0,0,0.05); }
    .admin-card h2 { font-size: 1.05rem; font-weight: 700; color: var(--anthracite); margin-bottom: 1.25rem; letter-spacing: -0.01em; }
    .admin-field { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
    .admin-field label { font-size: 0.76rem; font-weight: 600; color: var(--anthracite); }
    .admin-field input, .admin-field textarea { padding: 0.7rem 0.9rem; border: 1px solid #e3e5ea; border-radius: 9px; font-family: inherit; font-size: 0.9rem; background: #fafbfc; }
    .admin-field textarea { resize: vertical; min-height: 80px; }
    .admin-field input:focus, .admin-field textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(244,101,10,0.12); background: #fff; }
    .admin-field input[type="file"] { padding: 0.6rem; background: #fafbfc; }
    .admin-submit { width: 100%; padding: 0.85rem; background: var(--accent); color: #fff; border: none; border-radius: 9px; font-family: inherit; font-weight: 600; font-size: 0.92rem; cursor: pointer; transition: background 0.2s; margin-top: 0.5rem; }
    .admin-submit:hover:not(:disabled) { background: #d85408; }
    .admin-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .admin-status { margin-top: 0.9rem; font-size: 0.82rem; text-align: center; min-height: 1.1rem; }
    .admin-status[data-type="success"] { color: #2a8a4a; }
    .admin-status[data-type="error"] { color: #c83b3b; }
    .admin-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .admin-empty { color: var(--gray); font-size: 0.9rem; text-align: center; padding: 2rem 1rem; }
    .admin-piece-row { display: grid; grid-template-columns: 72px 1fr auto; gap: 1rem; background: #fff; border-radius: 12px; padding: 0.9rem; align-items: center; box-shadow: 0 4px 16px rgba(0,0,0,0.04); }
    .admin-piece-row img { width: 72px; height: 72px; object-fit: cover; border-radius: 8px; background: #f0f2f5; }
    .admin-piece-info h3 { font-size: 0.95rem; font-weight: 700; color: var(--anthracite); margin-bottom: 0.2rem; }
    .admin-piece-info p { font-size: 0.8rem; color: var(--gray); line-height: 1.4; }
    .admin-piece-tag { display: inline-block; font-size: 0.65rem; font-weight: 800; letter-spacing: 0.08em; color: var(--accent); background: rgba(244,101,10,0.1); padding: 0.2rem 0.55rem; border-radius: 16px; margin-bottom: 0.35rem; text-transform: uppercase; }
    .admin-piece-delete { background: transparent; border: 1px solid #e3e5ea; color: #c83b3b; padding: 0.5rem 0.8rem; border-radius: 7px; font-family: inherit; font-size: 0.78rem; cursor: pointer; transition: all 0.2s; }
    .admin-piece-delete:hover { background: #c83b3b; color: #fff; border-color: #c83b3b; }
  </style>
</head>
<body>

  <header class="admin-header">
    <h1>Eureka BTP · Admin Pièces</h1>
    <div class="admin-header-right">
      <span id="userLabel">…</span>
      <button id="logoutBtn">Déconnexion</button>
    </div>
  </header>

  <div class="admin-wrap">

    <form class="admin-card" id="pieceForm">
      <h2>Ajouter une pièce</h2>

      <div class="admin-field">
        <label for="pieceTitre">Titre</label>
        <input type="text" id="pieceTitre" required maxlength="120" placeholder="Ex. Pompe hydraulique pour toupie">
      </div>
      <div class="admin-field">
        <label for="pieceTag">Catégorie (tag)</label>
        <input type="text" id="pieceTag" maxlength="40" placeholder="Ex. Hydraulique, Toupie, Usure…">
      </div>
      <div class="admin-field">
        <label for="pieceDescription">Description</label>
        <textarea id="pieceDescription" maxlength="400" placeholder="Compatible toutes marques, performance durable…"></textarea>
      </div>
      <div class="admin-field">
        <label for="pieceImage">Photo</label>
        <input type="file" id="pieceImage" accept="image/*" required>
      </div>

      <button type="submit" class="admin-submit" id="pieceSubmit">Ajouter la pièce</button>
      <p class="admin-status" id="pieceStatus"></p>
    </form>

    <div>
      <h2 style="font-size:1.05rem;font-weight:700;color:var(--anthracite);margin-bottom:1rem;">Pièces enregistrées</h2>
      <div class="admin-list" id="pieceList">
        <p class="admin-empty">Chargement…</p>
      </div>
    </div>

  </div>

  <script type="module" src="../js/admin-pieces.js"></script>
</body>
</html>
